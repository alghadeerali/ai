openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Workspace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: conversations
    description: Conversation management
  - name: messages
    description: Message operations
  - name: personas
    description: Persona management
  - name: search
    description: Search operations
  - name: usage
    description: Usage and cost tracking
  - name: models
    description: AI model listing

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Projects ───────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: archived
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /projects/{id}/archive:
    patch:
      operationId: archiveProject
      tags: [projects]
      summary: Archive or restore a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchiveInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  # ─── Conversations ───────────────────────────────────────────
  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations, optionally filtered by project
      parameters:
        - name: projectId
          in: query
          schema:
            type: ["integer", "null"]
        - name: archived
          in: query
          schema:
            type: boolean
        - name: deleted
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a conversation with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
        "404":
          description: Not found
    patch:
      operationId: updateConversation
      tags: [conversations]
      summary: Update a conversation (title, model, persona, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Soft delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /conversations/{id}/archive:
    patch:
      operationId: archiveConversation
      tags: [conversations]
      summary: Archive or restore a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchiveInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/restore:
    patch:
      operationId: restoreConversation
      tags: [conversations]
      summary: Restore a soft-deleted conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/export:
    get:
      operationId: exportConversation
      tags: [conversations]
      summary: Export conversation as markdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Markdown export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"

  # ─── Messages ────────────────────────────────────────────────
  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message and get AI response (non-streaming)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: AI response message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResult"

  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  # ─── Personas ────────────────────────────────────────────────
  /personas:
    get:
      operationId: listPersonas
      tags: [personas]
      summary: List all personas
      responses:
        "200":
          description: Personas list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Persona"
    post:
      operationId: createPersona
      tags: [personas]
      summary: Create a new persona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Persona"

  /personas/{id}:
    patch:
      operationId: updatePersona
      tags: [personas]
      summary: Update a persona
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonaUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Persona"
    delete:
      operationId: deletePersona
      tags: [personas]
      summary: Delete a persona
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  # ─── Search ──────────────────────────────────────────────────
  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search across projects, conversations, and messages
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: projectId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ─── Usage / Cost ─────────────────────────────────────────────
  /usage/stats:
    get:
      operationId: getUsageStats
      tags: [usage]
      summary: Get overall usage stats and cost dashboard
      responses:
        "200":
          description: Usage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageStats"

  /usage/logs:
    get:
      operationId: listUsageLogs
      tags: [usage]
      summary: List recent usage logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: projectId
          in: query
          schema:
            type: ["integer", "null"]
        - name: model
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Usage logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsageLog"

  # ─── Models ──────────────────────────────────────────────────
  /models:
    get:
      operationId: listModels
      tags: [models]
      summary: List available AI models from OpenRouter
      responses:
        "200":
          description: Models list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiModel"

# ─── Schemas ─────────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    ArchiveInput:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]

    # ── Project ──────────────────────────────────────────────
    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        archived:
          type: boolean
        deletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        conversationCount:
          type: integer
      required: [id, name, archived, createdAt, updatedAt, conversationCount]

    ProjectInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        color:
          type: string
      required: [name]

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        color:
          type: string

    # ── Conversation ──────────────────────────────────────────
    Conversation:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: ["integer", "null"]
        title:
          type: string
        model:
          type: string
        personaId:
          type: ["integer", "null"]
        archived:
          type: boolean
        deletedAt:
          type: ["string", "null"]
        messageCount:
          type: integer
        lastMessageAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, model, archived, messageCount, createdAt, updatedAt]

    ConversationDetail:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: ["integer", "null"]
        title:
          type: string
        model:
          type: string
        personaId:
          type: ["integer", "null"]
        archived:
          type: boolean
        deletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        persona:
          oneOf:
            - $ref: "#/components/schemas/Persona"
            - type: "null"
      required: [id, title, model, archived, createdAt, updatedAt, messages]

    ConversationInput:
      type: object
      properties:
        projectId:
          type: ["integer", "null"]
        title:
          type: string
        model:
          type: string
        personaId:
          type: ["integer", "null"]
      required: [title, model]

    ConversationUpdate:
      type: object
      properties:
        title:
          type: string
        model:
          type: string
        personaId:
          type: ["integer", "null"]
        projectId:
          type: ["integer", "null"]

    ExportResult:
      type: object
      properties:
        markdown:
          type: string
        title:
          type: string
      required: [markdown, title]

    # ── Message ───────────────────────────────────────────────
    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        model:
          type: ["string", "null"]
        promptTokens:
          type: ["integer", "null"]
        completionTokens:
          type: ["integer", "null"]
        costUsd:
          type: ["number", "null"]
        createdAt:
          type: string
      required: [id, conversationId, role, content, createdAt]

    MessageInput:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        model:
          type: ["string", "null"]
      required: [content]

    SendMessageResult:
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/Message"
        assistantMessage:
          $ref: "#/components/schemas/Message"
      required: [userMessage, assistantMessage]

    # ── Persona ───────────────────────────────────────────────
    Persona:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        systemPrompt:
          type: string
        temperature:
          type: number
        isDefault:
          type: boolean
        emoji:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, systemPrompt, temperature, isDefault, createdAt, updatedAt]

    PersonaInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        systemPrompt:
          type: string
        temperature:
          type: number
        emoji:
          type: string
      required: [name, systemPrompt]

    PersonaUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        systemPrompt:
          type: string
        temperature:
          type: number
        emoji:
          type: string

    # ── Search ────────────────────────────────────────────────
    SearchResult:
      type: object
      properties:
        type:
          type: string
          enum: [project, conversation, message]
        id:
          type: integer
        title:
          type: string
        excerpt:
          type: ["string", "null"]
        conversationId:
          type: ["integer", "null"]
        projectId:
          type: ["integer", "null"]
        createdAt:
          type: string
      required: [type, id, title, createdAt]

    SearchResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        total:
          type: integer
      required: [results, total]

    # ── Usage ─────────────────────────────────────────────────
    ModelUsage:
      type: object
      properties:
        model:
          type: string
        totalMessages:
          type: integer
        totalTokens:
          type: integer
        totalCostUsd:
          type: number
      required: [model, totalMessages, totalTokens, totalCostUsd]

    ProjectUsage:
      type: object
      properties:
        projectId:
          type: ["integer", "null"]
        projectName:
          type: string
        totalMessages:
          type: integer
        totalCostUsd:
          type: number
      required: [projectName, totalMessages, totalCostUsd]

    UsageStats:
      type: object
      properties:
        totalCostUsd:
          type: number
        todayCostUsd:
          type: number
        totalMessages:
          type: integer
        totalConversations:
          type: integer
        topModel:
          type: ["string", "null"]
        topProject:
          type: ["string", "null"]
        byModel:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsage"
        byProject:
          type: array
          items:
            $ref: "#/components/schemas/ProjectUsage"
        dailyCosts:
          type: array
          items:
            $ref: "#/components/schemas/DailyCost"
      required: [totalCostUsd, todayCostUsd, totalMessages, totalConversations, byModel, byProject, dailyCosts]

    DailyCost:
      type: object
      properties:
        date:
          type: string
        costUsd:
          type: number
        messages:
          type: integer
      required: [date, costUsd, messages]

    UsageLog:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: ["integer", "null"]
        projectId:
          type: ["integer", "null"]
        model:
          type: string
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        totalTokens:
          type: integer
        costUsd:
          type: number
        createdAt:
          type: string
      required: [id, model, promptTokens, completionTokens, totalTokens, costUsd, createdAt]

    # ── AI Model ──────────────────────────────────────────────
    AiModel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        contextLength:
          type: ["integer", "null"]
        pricingPrompt:
          type: ["string", "null"]
        pricingCompletion:
          type: ["string", "null"]
        isFree:
          type: boolean
      required: [id, name, isFree]
